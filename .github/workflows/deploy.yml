name: Deploy Website to VM

on:
  push:
    branches:
      - main

jobs:
  build-and-deploy:
    name: Build & Deploy
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'

      - name: Install Dependencies
        run: npm ci

      - name: Build Application (SSG)
        run: npm run build

      - name: Setup SSH Directory & Key
        uses: shimataro/ssh-key-action@v2
        with:
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          known_hosts: 'unnecessary-since-we-keyscan'
          if_key_exists: replace

      - name: Scan SSH Host Keys
        run: |
          mkdir -p ~/.ssh
          ssh-keyscan -H ${{ secrets.HOST }} >> ~/.ssh/known_hosts

      - name: Sync Files to VM via Rsync
        run: |
          rsync -avz --delete dist/pouget-designs/browser/ ${{ secrets.USERNAME }}@${{ secrets.HOST }}:/var/www/pougetdesigns/
