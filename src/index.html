<!doctype html>
<html lang="de" class="transition-colors duration-300">
<head>
  <meta charset="utf-8">
  <title>Marcel Pouget | Web & Print Design, Fotografie</title>
  <base href="/">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <link rel="icon" type="image/png" href="favicon.png">
  
  <script>
    // Automatically apply dark mode based on system settings
    if (window.matchMedia('(prefers-color-scheme: dark)').matches) {
      document.documentElement.classList.add('dark');
    } else {
      document.documentElement.classList.remove('dark');
    }
    window.matchMedia('(prefers-color-scheme: dark)').addEventListener('change', e => {
      if (e.matches) {
        document.documentElement.classList.add('dark');
      } else {
        document.documentElement.classList.remove('dark');
      }
    });
  </script>
</head>
<body class="bg-brand-light dark:bg-brand-dark text-brand-text-body antialiased">
  <app-root></app-root>
</body>
</html>
