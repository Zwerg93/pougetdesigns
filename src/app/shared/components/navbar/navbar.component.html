<nav class="bg-brand-primary dark:bg-brand-dark/95 border-b border-white/10 text-white sticky top-0 z-40 shadow-lg backdrop-blur-md transition-all duration-300">
  <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8">
    <div class="flex items-center justify-between h-20">

      <!-- Brand Logo using favicon.png -->
      <div class="flex-shrink-0">
        <a routerLink="/" class="flex items-center gap-2.5 text-lg sm:text-xl font-bold tracking-wider hover:text-brand-secondary transition-colors duration-300">
          <img src="favicon.png" alt="Pouget Designs Logo" class="w-8 h-8 rounded-lg shadow-md object-contain bg-white p-0.5">
          POUGET DESIGNS
        </a>
      </div>

      <!-- Desktop Navigation Links -->
      <div class="hidden md:flex items-center space-x-8">
        <a routerLink="/" routerLinkActive="text-brand-secondary after:w-full" [routerLinkActiveOptions]="{exact: true}"
           class="relative py-2 hover:text-brand-secondary font-medium transition-colors duration-300 after:absolute after:bottom-0 after:left-0 after:h-[2px] after:w-0 after:bg-brand-secondary after:transition-all after:duration-300">Home</a>

        <a routerLink="/leistungen" routerLinkActive="text-brand-secondary after:w-full"
           class="relative py-2 hover:text-brand-secondary font-medium transition-colors duration-300 after:absolute after:bottom-0 after:left-0 after:h-[2px] after:w-0 after:bg-brand-secondary after:transition-all after:duration-300">Leistungen</a>

        <a routerLink="/portfolio" routerLinkActive="text-brand-secondary after:w-full"
           class="relative py-2 hover:text-brand-secondary font-medium transition-colors duration-300 after:absolute after:bottom-0 after:left-0 after:h-[2px] after:w-0 after:bg-brand-secondary after:transition-all after:duration-300">Portfolio</a>

        <a routerLink="/about" routerLinkActive="text-brand-secondary after:w-full"
           class="relative py-2 hover:text-brand-secondary font-medium transition-colors duration-300 after:absolute after:bottom-0 after:left-0 after:h-[2px] after:w-0 after:bg-brand-secondary after:transition-all after:duration-300">Über Mich</a>

        <a routerLink="/kontakt" routerLinkActive="text-brand-secondary after:w-full"
           class="relative py-2 hover:text-brand-secondary font-medium transition-colors duration-300 after:absolute after:bottom-0 after:left-0 after:h-[2px] after:w-0 after:bg-brand-secondary after:transition-all after:duration-300">Kontakt</a>
      </div>

      <!-- Desktop Action Area: Ruby-Mode Paw Toggler -->
      <div class="hidden md:flex items-center ml-4">
        <button (click)="rubyModeService.triggerRubyMode()" type="button"
                class="p-2.5 rounded-xl bg-white/5 border border-white/10 hover:bg-white/10 hover:border-brand-secondary/30 transition-all duration-300 text-gray-200 hover:text-brand-secondary shadow-inner"
                title="Ruby-Mode aktivieren (Katzenpfötchen)">
          <svg class="w-5 h-5" viewBox="0 0 24 24" fill="currentColor">
            <path d="M12 14c-1.66 0-3 1.34-3 3 0 2 2 3.5 3 3.5s3-1.5 3-3.5c0-1.66-1.34-3-3-3zm-4.5-4c-.83 0-1.5.67-1.5 1.5s1 2.5 1.5 2.5 1.5-1.5 1.5-2.5c0-.83-.67-1.5-1.5-1.5zm9 0c-.83 0-1.5.67-1.5 1.5 0 1 .5 2.5 1.5 2.5s1.5-1.5 1.5-2.5c0-.83-.67-1.5-1.5-1.5zm-6.5-3c-.83 0-1.5.67-1.5 1.5 0 1 1 2.5 1.5 2.5s1.5-1.5 1.5-2.5c0-.83-.67-1.5-1.5-1.5zm4 0c-.83 0-1.5.67-1.5 1.5 0 1 1 2.5 1.5 2.5s1.5-1.5 1.5-2.5c0-.83-.67-1.5-1.5-1.5z"/>
          </svg>
        </button>
      </div>

      <!-- Mobile Hamburger and Ruby-Mode Button Wrapper -->
      <div class="flex items-center gap-3 md:hidden">
        <!-- Ruby-Mode toggle for Mobile -->
        <button (click)="rubyModeService.triggerRubyMode()" type="button"
                class="p-2 rounded-lg bg-white/5 border border-white/10 hover:bg-white/10 text-gray-200 hover:text-brand-secondary transition-colors"
                title="Ruby-Mode">
          <svg class="w-5 h-5" viewBox="0 0 24 24" fill="currentColor">
            <path d="M12 14c-1.66 0-3 1.34-3 3 0 2 2 3.5 3 3.5s3-1.5 3-3.5c0-1.66-1.34-3-3-3zm-4.5-4c-.83 0-1.5.67-1.5 1.5s1 2.5 1.5 2.5 1.5-1.5 1.5-2.5c0-.83-.67-1.5-1.5-1.5zm9 0c-.83 0-1.5.67-1.5 1.5 0 1 .5 2.5 1.5 2.5s1.5-1.5 1.5-2.5c0-.83-.67-1.5-1.5-1.5zm-6.5-3c-.83 0-1.5.67-1.5 1.5 0 1 1 2.5 1.5 2.5s1.5-1.5 1.5-2.5c0-.83-.67-1.5-1.5-1.5zm4 0c-.83 0-1.5.67-1.5 1.5 0 1 1 2.5 1.5 2.5s1.5-1.5 1.5-2.5c0-.83-.67-1.5-1.5-1.5z"/>
          </svg>
        </button>

        <!-- Hamburger Icon -->
        <button (click)="toggleMenu()" type="button"
                class="inline-flex items-center justify-center p-2 rounded-lg bg-white/5 border border-white/10 hover:bg-white/10 focus:outline-none transition-colors"
                aria-controls="mobile-menu"
                [aria-expanded]="isOpen()">
          <span class="sr-only">Menü öffnen</span>
          <svg class="h-6 w-6" fill="none" viewBox="0 0 24 24" stroke="currentColor">
            @if (isOpen()) {
              <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12" />
            } @else {
              <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 6h16M4 12h16M4 18h16" />
            }
          </svg>
        </button>
      </div>

    </div>
  </div>

  <!-- Mobile Dropdown Menu -->
  @if (isOpen()) {
    <div class="md:hidden bg-brand-primary dark:bg-brand-dark border-t border-white/10 animate-fadeIn" id="mobile-menu">
      <div class="px-3 pt-3 pb-6 space-y-2">
        <a routerLink="/" (click)="closeMenu()" routerLinkActive="text-brand-secondary bg-white/5" [routerLinkActiveOptions]="{exact: true}"
           class="block px-4 py-3 rounded-xl text-base font-semibold hover:bg-white/5 hover:text-brand-secondary transition-all">Home</a>

        <a routerLink="/leistungen" (click)="closeMenu()" routerLinkActive="text-brand-secondary bg-white/5"
           class="block px-4 py-3 rounded-xl text-base font-semibold hover:bg-white/5 hover:text-brand-secondary transition-all">Leistungen</a>

        <a routerLink="/portfolio" (click)="closeMenu()" routerLinkActive="text-brand-secondary bg-white/5"
           class="block px-4 py-3 rounded-xl text-base font-semibold hover:bg-white/5 hover:text-brand-secondary transition-all">Portfolio</a>

        <a routerLink="/about" (click)="closeMenu()" routerLinkActive="text-brand-secondary bg-white/5"
           class="block px-4 py-3 rounded-xl text-base font-semibold hover:bg-white/5 hover:text-brand-secondary transition-all">Über Mich</a>

        <a routerLink="/kontakt" (click)="closeMenu()" routerLinkActive="text-brand-secondary bg-white/5"
           class="block px-4 py-3 rounded-xl text-base font-semibold hover:bg-white/5 hover:text-brand-secondary transition-all">Kontakt</a>
      </div>
    </div>
  }
</nav>
